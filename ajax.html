<!DOCTYPE html>
<html>
<head>
    <title>Weather App</title>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body{
            text-align:center;
            font-family:Arial;
            margin-top:50px;
        }

        input,button{
            padding:10px ;
        }

        #result{
            margin-top:20px;
            font-size:20px;
        }
    </style>
</head>

<body>

<h2>Weather App</h2>

<input type="text" id="city" placeholder="Enter City">

<button id="btn">Get Weather</button>

<div id="result"></div>

<script>

$("#btn").click(function(){

    var city = $("#city").val();

    $.ajax({
        url:"https://wttr.in/" + city + "?format=%C+%t",

        success:function(data){

            $("#result").html("Weather: " + data);

        }
    });

});
</script>

</body>
</html>
